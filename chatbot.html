<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
      }

      .send-button {
        background-color: rgb(25, 135, 84);
        color: white;
        font-size: 15px;
        border: none;
        border-radius: 10px;
        padding: 12px 20px;
        cursor: pointer;
      }

      .chat-input {
        font-size: 15px;
        padding: 10px 15px;
        border-radius: 10px;
        border: solid 1px;
        margin-right: 10px;
        flex-grow: 1;
      }

      .chat-input-container {
        display: flex;
        margin-top: 20px;
      }

      .app-container {
        max-width: 600px;
        margin: 0 auto 0 auto;
      }

      .chat-message-user {
        display: flex;
        justify-content: end;
        margin: 20px 0 20px 0;
        align-items: start;
      }

      .chat-message-robot {
        display: flex;
        align-items: start;
      }

      .chat-message-text {
        background-color: rgb(238, 238, 238);
        padding: 15px 20px;
        border-radius: 10px;
        margin: 0 10px 0 10px;
        max-width: 300px;
      }

      .chat-message-profile {
        width: 48px;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput ({ chatMessages, setChatMessages }) {
        const [ inputText, setInputText ] = React.useState("");

        function saveInputText(event) {
          setInputText(event.target.value);
        };

        async function sendMessage() {
          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: "user",
              id: crypto.randomUUID() // create a unique id
            }
          ];

          setChatMessages(newChatMessages);
          setInputText("");

          const response = await Chatbot.getResponseAsync(inputText);
          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: "robot",
              id: crypto.randomUUID()
            }
          ]);
        };

        function handleKeyDown(event) {
          if (event.key === "Enter") {
            sendMessage();
          };

          if (event.key === "Escape") {
            setInputText("");
          };
        };

        return (
          <div className="chat-input-container">            
            <input 
              placeholder="Send a message to Chatbot"
              size="30"
              onKeyDown={handleKeyDown}
              onChange={saveInputText}
              value={inputText}
              className="chat-input"
            />
            <button className="send-button" onClick={sendMessage}>Send</button>
          </div>
        );
      };

      function ChatMessage({ message, sender }) { // props = properties
        // const message = props.message;
        // const sender = props.sender;
        // const {message, sender } = props;

        /*
        if (sender === "robot") {
          return (
            <div>
              <img src="https://supersimple.dev/projects/chatbot/robot.png" width="48px" />
              {message}
            </div>
          );
        }
        */

        return (
          <div className={
            sender === "user" 
              ? "chat-message-user" 
              : "chat-message-robot"
          }>
            {sender === "robot" && (
              <img src="https://supersimple.dev/projects/chatbot/robot.png"
              className="chat-message-profile" />
            )}
            <div className="chat-message-text">            
              {message}
            </div>
            {sender === "user" && (
              <img src="https://supersimple.dev/projects/chatbot/user.png"
              className="chat-message-profile" />
            )}
          </div>
        );
      };

      function ChatMessages({ chatMessages }) {
        return (
          <>
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </>
        );
      };

      function App() {
        const [ chatMessages, setChatMessages ] = React.useState([
        {
          message: "hello chatbot",
          sender: "user",
          id: "id1"
        },
        {
          message: "Hello! How can I help you?",
          sender: "robot",
          id: "id2"
        },
        {
          message: "Can you get me todays date?",
          sender: "user",
          id: "id3"
        },
        {
          message: "Today is February 17",
          sender: "robot",
          id: "id4"
        }]);
        // const [ chatMessages, setChatMessages ] = array; // Array Destructuring
        // const chatMessages = array[0]; // current data
        // const setChatMessages = array[1]; // function that updates the data

        return (
          <div className="app-container">
            <ChatInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
            <ChatMessages
              chatMessages={chatMessages}
            />
          </div>
        );
      };
    
      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);

    </script>
  </body>
</html>
