<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercises - State and Event Handlers</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function InputDisplay() {
        const [ input, setInput ] = React.useState("");

        function saveInput(event) {
          setInput(event.target.value)
        };

        function reset() {
          setInput("");
        };

        function example() {
          setInput("Simon")
        };

        return (
          <div>
            <input
              placeholder="Type a name here"
              onChange={saveInput}
              value={input}
            />
            <button onClick={reset}>Reset</button>
            <button onClick={example}>Example</button>
            <p>Hello {input}</p>
          </div>
        );
      };

      function Counter({ countNumber, setCountNumber }) {
        function count() {
          setCountNumber(
            countNumber + 1
          );
        };

        return (
          <>
            {countNumber === 1 && (
              <button onClick={count}>Clicked {countNumber} time</button>
            )}
            {countNumber !== 1 && (
              <button onClick={count}>Clicked {countNumber} times</button>
            )}
          </>
        );
      };

      function App() {
        const [ countNumber, setCountNumber ] = React.useState(0);

        function reset() {
          setCountNumber(0);
        };

        return (
          <>
            <Counter
              countNumber={countNumber}
              setCountNumber={setCountNumber}
            />
            <Counter
              countNumber={countNumber}
              setCountNumber={setCountNumber}
            />
            <button onClick={reset}>Reset</button>
            <InputDisplay />
          </>
        );
      };

      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);

    </script>
  </body>
</html>
